<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>儿童英语学习</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f8ff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:420px;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

.word{
    font-size:60px;
    font-weight:bold;
    color:#1e3a5f;
}

.chinese{
    font-size:28px;
    color:#4caf50;
    margin-top:10px;
}

.example{
    margin-top:20px;
    font-size:22px;
    line-height:1.5;
}

.progress{
    margin-top:20px;
    font-weight:bold;
}

.buttons{
    margin-top:25px;
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
}

.next{
    background:#4caf50;
    color:white;
}

.prev{
    background:#2196f3;
    color:white;
}

.remember{
    background:#ff9800;
    color:white;
    width:100%;
    margin-top:15px;
}

.star{
    font-size:24px;
    margin-top:15px;
}

#wordImage{
    width:250px;
    height:200px;
    object-fit:cover;
    border-radius:20px;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<div class="word" id="word"></div>

<img id="wordImage" width="250">

<div class="chinese" id="chinese"></div>

<div class="example" id="example"></div>

<div class="progress" id="progress"></div>

<div class="star" id="star"></div>

<div id="result"></div>

<button class="remember" onclick="speakWord()">
🔊 发音
</button>

<div class="buttons">

<div id="options"></div>

<button class="prev" onclick="prevWord()">上一张</button>

<button onclick="randomWord()">🎲随机</button>

<button class="next" onclick="nextWord()">下一张</button>
</div>

<script>

const words = [

{
word:"apple",
chinese:"苹果",
example:"I eat an apple every day.",
image:"images/apple.jpg"
},

{
word:"dog",
chinese:"狗",
example:"The dog is running.",
image:"images/dog.jpg"
},

{
word:"cat",
chinese:"猫",
example:"The cat is sleeping.",
image:"images/cat.jpg"
},

{
word:"blood",
chinese:"血液",
example:"Blood is the red liquid in your body.",
image:"images/blood.jpg"
},

{
word:"sun",
chinese:"太阳",
example:"The sun is shining.",
image:"images/sun.jpg"
}

];

let current=0;
let stars=0;
let answered=false;

function showWord(){

document.getElementById("word").innerText=
"猜猜这是什么？";

document.getElementById("wordImage").src =
words[current].image;

document.getElementById("chinese").innerText=
words[current].chinese;

document.getElementById("example").innerText=
words[current].example;

document.getElementById("progress").innerText=
`进度 ${current+1} / ${words.length}`;

document.getElementById("star").innerText=
"⭐".repeat(stars);

document.getElementById("result").innerText="";

let options = [];

// 先放入正确答案
options.push(words[current].word);

// 随机加入其他单词
while(options.length < 4){

let randomIndex =
Math.floor(Math.random() * words.length);

let randomWord =
words[randomIndex].word;

// 避免重复
if(!options.includes(randomWord)){

options.push(randomWord);

}

}

// 打乱顺序
options.sort(() => Math.random() - 0.5);

let html = "";

for(let i=0;i<options.length;i++){

html += `
<button onclick="checkAnswer('${options[i]}')">
${options[i]}
</button>
`;

}

document.getElementById("options").innerHTML =
html;

speakWord();

}
function nextWord(){

current++;

if(current>=words.length){

alert(
`🎉 恭喜完成学习！

获得 ${stars} 颗星`
);

current=0;

}

answered=false;

showWord();

}


function prevWord(){

current--;

if(current<0){
current=words.length-1;
}

answered=false;

showWord();

}

function rememberWord(){

stars++;

showWord();

}


function speakWord(){

let utterance =
new SpeechSynthesisUtterance(
words[current].word
);

utterance.lang = "en-US";

speechSynthesis.speak(
utterance
);

}

function randomWord(){

current =
Math.floor(
Math.random() * words.length
);

answered=false;

showWord();

}

function checkAnswer(answer){

if(answer === words[current].word){

if(!answered){

stars++;
answered=true;

}

document.getElementById("result").innerText =
"✅ 正确！";

showWord();

setTimeout(function(){

nextWord();

},1000);

}else{

document.getElementById("result").innerText =
"❌ 再试试";

}

}

showWord();
</script>

</body>
</html>
